name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      koel_version:
        description: 'Koel release tag to bundle (e.g. v9.2.1). Defaults to the tag being pushed.'
        required: false
        type: string
      frankenphp_version:
        description: 'FrankenPHP release tag to bundle (e.g. v1.12.2). Defaults to FRANKENPHP_VERSION below.'
        required: false
        type: string

env:
  FRANKENPHP_VERSION: v1.12.2

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - mac-arm64
          - mac-x86_64
          - linux-x86_64
          - linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          KOEL_VERSION="${{ inputs.koel_version || github.ref_name }}"
          FRANKENPHP_VERSION="${{ inputs.frankenphp_version || env.FRANKENPHP_VERSION }}"
          echo "koel_version=$KOEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "frankenphp_version=$FRANKENPHP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build bundle for ${{ matrix.platform }}
        env:
          KOEL_VERSION: ${{ steps.versions.outputs.koel_version }}
          FRANKENPHP_VERSION: ${{ steps.versions.outputs.frankenphp_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ./build.sh
          BUNDLE_NAME="koel-franken-$KOEL_VERSION-$PLATFORM"
          tar -czf "build/$BUNDLE_NAME.tar.gz" -C build "$BUNDLE_NAME"
          ls -la "build/$BUNDLE_NAME.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: koel-franken-${{ matrix.platform }}
          path: build/koel-franken-*-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: koel-franken-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            artifacts/koel-franken-*.tar.gz
