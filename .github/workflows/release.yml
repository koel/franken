name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      koel_version:
        description: 'Koel release tag to bundle (e.g. v9.2.1). Defaults to the tag being pushed.'
        required: false
        type: string
      frankenphp_version:
        description: 'FrankenPHP release tag to bundle (e.g. v1.12.2). Defaults to FRANKENPHP_VERSION below.'
        required: false
        type: string

env:
  FRANKENPHP_VERSION: v1.12.2

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - mac-arm64
          - mac-x86_64
          - linux-x86_64
          - linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          KOEL_VERSION="${{ inputs.koel_version || github.ref_name }}"
          FRANKENPHP_VERSION="${{ inputs.frankenphp_version || env.FRANKENPHP_VERSION }}"
          echo "koel_version=$KOEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "frankenphp_version=$FRANKENPHP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build bundle for ${{ matrix.platform }}
        env:
          KOEL_VERSION: ${{ steps.versions.outputs.koel_version }}
          FRANKENPHP_VERSION: ${{ steps.versions.outputs.frankenphp_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ./build.sh
          BUNDLE_NAME="koel-franken-$KOEL_VERSION-$PLATFORM"
          tar -czf "build/$BUNDLE_NAME.tar.gz" -C build "$BUNDLE_NAME"
          ls -la "build/$BUNDLE_NAME.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: koel-franken-${{ matrix.platform }}
          path: build/koel-franken-*-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: koel-franken-${{ matrix.platform }}
          path: artifact

      - name: Extract bundle and boot it
        run: |
          set -e
          BUNDLE=$(ls artifact/koel-franken-*-${{ matrix.platform }}.tar.gz | head -1)
          tar -xzf "$BUNDLE"
          DIR=$(basename "$BUNDLE" .tar.gz)
          echo "BUNDLE_DIR=$PWD/$DIR" >> "$GITHUB_ENV"

      - name: Start php-server in the background
        working-directory: ${{ env.BUNDLE_DIR }}
        run: |
          ./koel php-server --listen :8000 > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

          # Wait up to 60s for the first-run init (key:generate + migrate) and the server to bind.
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:8000/; then
              echo "server responding after ${i}s"
              exit 0
            fi
            sleep 1
          done

          echo "::error::server never responded on :8000"
          echo "--- server log ---"
          cat /tmp/server.log
          exit 1

      - name: HTTP smoke test
        run: |
          set -e
          curl -fsS http://localhost:8000/ -o /tmp/index.html
          grep -q '<title>Koel</title>' /tmp/index.html

          # /api/ping must return a clean body — any PHP-8.5 deprecation leaking into
          # the response stream would corrupt JSON responses.
          curl -fsS http://localhost:8000/api/ping -o /tmp/api-ping
          ! grep -qi 'deprecated\|<br' /tmp/api-ping

      - name: Artisan smoke test
        working-directory: ${{ env.BUNDLE_DIR }}
        run: ./koel php-cli artisan --version

      - name: Convention check ($HOME/.koel)
        run: |
          set -e
          test -f "$HOME/.koel/.env"
          test -s "$HOME/.koel/db.sqlite"
          test -d "$HOME/.koel/storage/app/public"
          test -f "$HOME/.koel/php.d/koel.ini"

      - name: Tear down
        if: always()
        run: kill "${SERVER_PID:-0}" 2>/dev/null || true

  release:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: koel-franken-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            artifacts/koel-franken-*.tar.gz
