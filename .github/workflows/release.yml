name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      koel_version:
        description: 'Koel release tag to bundle (e.g. v9.2.1). Defaults to the tag being pushed.'
        required: false
        type: string
      frankenphp_version:
        description: 'FrankenPHP release tag to bundle (e.g. v1.12.2). Defaults to FRANKENPHP_VERSION below.'
        required: false
        type: string

env:
  FRANKENPHP_VERSION: v1.12.2

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - mac-arm64
          - mac-x86_64
          - linux-x86_64
          - linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          KOEL_VERSION="${{ inputs.koel_version || github.ref_name }}"
          FRANKENPHP_VERSION="${{ inputs.frankenphp_version || env.FRANKENPHP_VERSION }}"
          echo "koel_version=$KOEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "frankenphp_version=$FRANKENPHP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build bundle for ${{ matrix.platform }}
        env:
          KOEL_VERSION: ${{ steps.versions.outputs.koel_version }}
          FRANKENPHP_VERSION: ${{ steps.versions.outputs.frankenphp_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ./build.sh
          BUNDLE_NAME="koel-franken-$KOEL_VERSION-$PLATFORM"
          tar -czf "build/$BUNDLE_NAME.tar.gz" -C build "$BUNDLE_NAME"
          ls -la "build/$BUNDLE_NAME.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: koel-franken-${{ matrix.platform }}
          path: build/koel-franken-*-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: koel-franken-${{ matrix.platform }}
          path: artifact

      - name: Extract bundle and boot it
        run: |
          set -e
          BUNDLE=$(ls artifact/koel-franken-*-${{ matrix.platform }}.tar.gz | head -1)
          tar -xzf "$BUNDLE"
          DIR=$(basename "$BUNDLE" .tar.gz)
          echo "BUNDLE_DIR=$PWD/$DIR" >> "$GITHUB_ENV"

      - name: First-run init (sync)
        working-directory: ${{ env.BUNDLE_DIR }}
        # `php-cli artisan --version` boots Laravel via the launcher, which on
        # first run runs `key:generate` and `migrate` before exec'ing. Doing it
        # synchronously here keeps the next step's poll-for-bind cheap (server
        # boots in <2s once init has already happened).
        run: ./koel php-cli artisan --version

      - name: Start php-server in the background
        working-directory: ${{ env.BUNDLE_DIR }}
        run: |
          ./koel php-server --listen :8000 > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

          # Wait until the server is actually accepting TCP connections.
          # `curl --max-time 2` without `-f` succeeds on any HTTP response (even 5xx)
          # and fails only on connection error — exactly the discriminator we want.
          for i in $(seq 1 30); do
            if curl -sS -o /dev/null --max-time 2 http://localhost:8000/ 2>/dev/null; then
              echo "server bound after ${i}s"
              exit 0
            fi
            sleep 1
          done

          echo "::error::server never bound on :8000"
          echo "--- server log ---"
          cat /tmp/server.log
          exit 1

      - name: HTTP smoke test
        run: |
          dump_diagnostics() {
            echo "--- response body ---"
            cat "$1" 2>/dev/null || echo "(no body)"
            echo
            echo "--- laravel.log ---"
            cat "$HOME/.koel/storage/logs/laravel.log" 2>/dev/null || echo "(no laravel.log)"
            echo "--- server log ---"
            cat /tmp/server.log 2>/dev/null || echo "(no server log)"
            echo "--- server process status ---"
            if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "PID $SERVER_PID still alive"
            else
              echo "PID ${SERVER_PID:-?} is gone"
            fi
          }

          code=$(curl -sS -o /tmp/index.html -w '%{http_code}' http://localhost:8000/ 2>/tmp/curl-err.log) || true
          echo "GET / → ${code:-curl-failed}"
          if [ -s /tmp/curl-err.log ]; then
            echo "curl stderr: $(cat /tmp/curl-err.log)"
          fi
          if [ "$code" != "200" ] || ! grep -q '<title>Koel</title>' /tmp/index.html 2>/dev/null; then
            echo "::error::GET / failed"
            dump_diagnostics /tmp/index.html
            exit 1
          fi

          code=$(curl -sS -o /tmp/api-ping -w '%{http_code}' http://localhost:8000/api/ping 2>/tmp/curl-err.log) || true
          echo "GET /api/ping → ${code:-curl-failed}"
          if [ "$code" != "200" ]; then
            echo "::error::GET /api/ping failed"
            dump_diagnostics /tmp/api-ping
            exit 1
          fi

          # /api/ping must return a clean body — any PHP-8.5 deprecation leaking into
          # the response stream would corrupt JSON responses.
          if grep -qi 'deprecated\|<br' /tmp/api-ping; then
            echo "::error::/api/ping response body contains deprecation noise"
            dump_diagnostics /tmp/api-ping
            exit 1
          fi

      - name: Artisan smoke test
        working-directory: ${{ env.BUNDLE_DIR }}
        run: ./koel php-cli artisan --version

      - name: Convention check ($HOME/.koel)
        run: |
          set -e
          test -f "$HOME/.koel/.env"
          test -s "$HOME/.koel/db.sqlite"
          test -d "$HOME/.koel/storage/app/public"
          test -f "$HOME/.koel/php.d/koel.ini"

      - name: Tear down
        if: always()
        run: kill "${SERVER_PID:-0}" 2>/dev/null || true

  release:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: koel-franken-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            artifacts/koel-franken-*.tar.gz
